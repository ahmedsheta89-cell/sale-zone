name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA to deploy (optional, defaults to current SHA)"
        required: false
        type: string
      checklist_path:
        description: "Path to release checklist JSON"
        required: false
        default: "release/release-checklist.json"
        type: string

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify-gates:
    name: verify-gates
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.sha.outputs.value }}
      checklist_path: ${{ steps.meta.outputs.checklist_path }}
      backend_run_id: ${{ steps.verify.outputs.backend_run_id }}
      staging_run_id: ${{ steps.verify.outputs.staging_run_id }}
      firestore_rules_run_id: ${{ steps.verify.outputs.firestore_rules_run_id }}
      release_gate_run_id: ${{ steps.verify.outputs.release_gate_run_id }}
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          manual_sha="${{ github.event.inputs.target_sha || '' }}"
          if [ -n "$manual_sha" ]; then
            echo "value=$manual_sha" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve checklist path
        id: meta
        run: |
          manual_path="${{ github.event.inputs.checklist_path || '' }}"
          if [ -n "$manual_path" ]; then
            echo "checklist_path=$manual_path" >> "$GITHUB_OUTPUT"
          else
            echo "checklist_path=release/release-checklist.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release gate, staging, firestore rules, and backend deploy succeeded for target SHA
        id: verify
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.sha.outputs.value }}
        with:
          script: |
            const targetSha = process.env.TARGET_SHA;
            const requiredWorkflows = [
              { id: "release-gate.yml", label: "Release Gate" },
              { id: "deploy-staging.yml", label: "Deploy Staging" },
              { id: "deploy-firestore-rules.yml", label: "Deploy Firestore Rules" },
              { id: "deploy-backend.yml", label: "Deploy Backend" }
            ];
            let stagingSuccessRun = null;
            let backendSuccessRun = null;
            let rulesSuccessRun = null;
            let releaseGateSuccessRun = null;

            for (const wf of requiredWorkflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                head_sha: targetSha,
                per_page: 30
              });

              const successRun = runs.data.workflow_runs.find((run) => (
                run.status === "completed" && run.conclusion === "success"
              ));

              if (!successRun) {
                core.setFailed(`${wf.label} is not successful for SHA ${targetSha}`);
                return;
              }
              if (successRun.head_sha !== targetSha) {
                core.setFailed(`${wf.label} run head_sha mismatch (expected ${targetSha}, got ${successRun.head_sha})`);
                return;
              }

              if (wf.id === "deploy-staging.yml") {
                stagingSuccessRun = successRun;
              }
              if (wf.id === "deploy-backend.yml") {
                backendSuccessRun = successRun;
              }
              if (wf.id === "deploy-firestore-rules.yml") {
                rulesSuccessRun = successRun;
              }
              if (wf.id === "release-gate.yml") {
                releaseGateSuccessRun = successRun;
              }
            }

            if (!stagingSuccessRun) {
              core.setFailed(`Deploy Staging success run was not found for SHA ${targetSha}`);
              return;
            }
            if (!backendSuccessRun) {
              core.setFailed(`Deploy Backend success run was not found for SHA ${targetSha}`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: stagingSuccessRun.id,
              per_page: 100
            });
            const expectedArtifactName = `staging-${targetSha}`;
            const hasExpectedArtifact = artifacts.data.artifacts.some((artifact) => artifact.name === expectedArtifactName);
            if (!hasExpectedArtifact) {
              core.setFailed(`Deploy Staging artifact "${expectedArtifactName}" not found for SHA ${targetSha}`);
              return;
            }

            const backendArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: backendSuccessRun.id,
              per_page: 100
            });
            const expectedBackendArtifactName = `backend-${targetSha}`;
            const hasExpectedBackendArtifact = backendArtifacts.data.artifacts.some((artifact) => artifact.name === expectedBackendArtifactName);
            if (!hasExpectedBackendArtifact) {
              core.setFailed(`Deploy Backend artifact "${expectedBackendArtifactName}" not found for SHA ${targetSha}`);
              return;
            }

            core.setOutput('backend_run_id', String(backendSuccessRun.id));
            core.setOutput('staging_run_id', String(stagingSuccessRun.id));
            core.setOutput('firestore_rules_run_id', String(rulesSuccessRun ? rulesSuccessRun.id : ''));
            core.setOutput('release_gate_run_id', String(releaseGateSuccessRun ? releaseGateSuccessRun.id : ''));

            core.info(`All upstream gates passed for SHA ${targetSha}`);

  package-production:
    name: package-production
    needs:
      - verify-gates
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-gates.outputs.target_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0

      - name: Install tooling dependencies
        run: npm ci --prefix sale-zone --no-audit --no-fund

      - name: Verify checkout SHA matches target
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          target_sha="${{ needs.verify-gates.outputs.target_sha }}"
          if [[ "$actual_sha" != "$target_sha" ]]; then
            echo "::error::Checkout SHA mismatch (actual=$actual_sha, target=$target_sha)"
            exit 1
          fi

      - name: Download backend artifact for target SHA
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ needs.verify-gates.outputs.target_sha }}
          run-id: ${{ needs.verify-gates.outputs.backend_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: backend-artifact

      - name: Validate backend metadata artifact
        env:
          TARGET_SHA: ${{ needs.verify-gates.outputs.target_sha }}
        run: |
          set -euo pipefail
          test -f backend-artifact/backend-metadata.json || { echo "::error::backend-metadata.json missing"; exit 1; }
          TARGET_SHA="$TARGET_SHA" node - <<'NODE'
          const fs = require('fs');
          const targetSha = String(process.env.TARGET_SHA || '');
          const raw = fs.readFileSync('backend-artifact/backend-metadata.json', 'utf8');
          let metadata;
          try {
            metadata = JSON.parse(raw);
          } catch (error) {
            throw new Error(`Invalid backend metadata JSON: ${error.message}`);
          }
          if (!metadata || typeof metadata !== 'object') {
            throw new Error('backend-metadata.json must contain an object.');
          }
          if (String(metadata.commitSha || '') !== targetSha) {
            throw new Error(`backend metadata commitSha mismatch (expected ${targetSha}, got ${metadata.commitSha})`);
          }
          if (String(metadata.workflow || '') !== 'deploy-backend') {
            throw new Error(`backend metadata workflow mismatch (expected deploy-backend, got ${metadata.workflow})`);
          }
          if (metadata.functionsDeployed !== true || metadata.indexesAttempted !== true) {
            throw new Error('backend metadata flags must be true for functionsDeployed and indexesAttempted.');
          }
          NODE

      - name: Re-run full required checks on target SHA
        run: node tools/run-required-checks.js

      - name: Validate release checklist
        run: node tools/validate-release-checklist.js "${{ needs.verify-gates.outputs.checklist_path }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-production:
    name: deploy-production
    needs:
      - package-production
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

