name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA to deploy (optional, defaults to current SHA)"
        required: false
        type: string
      checklist_path:
        description: "Path to release checklist JSON"
        required: false
        default: "release/release-checklist.json"
        type: string

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify-gates:
    name: verify-gates
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.sha.outputs.value }}
      checklist_path: ${{ steps.meta.outputs.checklist_path }}
      release_gate_run_id: ${{ steps.verify_upstream.outputs.release_gate_run_id }}
      staging_run_id: ${{ steps.verify_upstream.outputs.staging_run_id }}
      firestore_rules_run_id: ${{ steps.verify_upstream.outputs.firestore_rules_run_id }}
      backend_run_id: ${{ steps.verify_upstream.outputs.backend_run_id }}
      backend_functions_revision: ${{ steps.validate_backend_metadata.outputs.functions_revision }}
      backend_indexes_source_sha: ${{ steps.validate_backend_metadata.outputs.indexes_source_sha }}
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          manual_sha="${{ github.event.inputs.target_sha || '' }}"
          if [ -n "$manual_sha" ]; then
            echo "value=$manual_sha" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve checklist path
        id: meta
        run: |
          manual_path="${{ github.event.inputs.checklist_path || '' }}"
          if [ -n "$manual_path" ]; then
            echo "checklist_path=$manual_path" >> "$GITHUB_OUTPUT"
          else
            echo "checklist_path=release/release-checklist.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release gate, staging, firestore rules, and backend deploy succeeded for target SHA
        id: verify_upstream
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.sha.outputs.value }}
        with:
          script: |
            const targetSha = process.env.TARGET_SHA;
            const requiredWorkflows = [
              { id: "release-gate.yml", label: "Release Gate" },
              { id: "deploy-staging.yml", label: "Deploy Staging" },
              { id: "deploy-firestore-rules.yml", label: "Deploy Firestore Rules" },
              { id: "deploy-backend.yml", label: "Deploy Backend" }
            ];
            let stagingSuccessRun = null;
            let backendSuccessRun = null;
            const workflowRunMap = {};

            for (const wf of requiredWorkflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                head_sha: targetSha,
                per_page: 30
              });

              const successRun = runs.data.workflow_runs.find((run) => (
                run.status === "completed" && run.conclusion === "success"
              ));

              if (!successRun) {
                core.setFailed(`${wf.label} is not successful for SHA ${targetSha}`);
                return;
              }
              if (String(successRun.head_sha || "") !== targetSha) {
                core.setFailed(`${wf.label} head_sha mismatch (expected ${targetSha}, got ${String(successRun.head_sha || "")})`);
                return;
              }

              workflowRunMap[wf.id] = successRun.id;

              if (wf.id === "deploy-staging.yml") {
                stagingSuccessRun = successRun;
              }
              if (wf.id === "deploy-backend.yml") {
                backendSuccessRun = successRun;
              }
            }

            if (!stagingSuccessRun) {
              core.setFailed(`Deploy Staging success run was not found for SHA ${targetSha}`);
              return;
            }
            if (!backendSuccessRun) {
              core.setFailed(`Deploy Backend success run was not found for SHA ${targetSha}`);
              return;
            }

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: stagingSuccessRun.id,
              per_page: 100
            });
            const expectedArtifactName = `staging-${targetSha}`;
            const hasExpectedArtifact = artifacts.data.artifacts.some((artifact) => artifact.name === expectedArtifactName);
            if (!hasExpectedArtifact) {
              core.setFailed(`Deploy Staging artifact "${expectedArtifactName}" not found for SHA ${targetSha}`);
              return;
            }

            const backendArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: backendSuccessRun.id,
              per_page: 100
            });
            const expectedBackendArtifact = `backend-${targetSha}`;
            const backendArtifact = backendArtifacts.data.artifacts.find((artifact) => artifact.name === expectedBackendArtifact);
            if (!backendArtifact) {
              core.setFailed(`Deploy Backend artifact "${expectedBackendArtifact}" not found for SHA ${targetSha}`);
              return;
            }

            core.setOutput("release_gate_run_id", String(workflowRunMap["release-gate.yml"] || ""));
            core.setOutput("staging_run_id", String(workflowRunMap["deploy-staging.yml"] || ""));
            core.setOutput("firestore_rules_run_id", String(workflowRunMap["deploy-firestore-rules.yml"] || ""));
            core.setOutput("backend_run_id", String(workflowRunMap["deploy-backend.yml"] || ""));
            core.setOutput("backend_artifact_id", String(backendArtifact.id || ""));
            core.info(`All upstream gates passed for SHA ${targetSha}`);

      - name: Validate backend metadata artifact
        id: validate_backend_metadata
        env:
          TARGET_SHA: ${{ steps.sha.outputs.value }}
          BACKEND_ARTIFACT_ID: ${{ steps.verify_upstream.outputs.backend_artifact_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -z "${BACKEND_ARTIFACT_ID}" ]]; then
            echo "::error::Missing backend artifact id from upstream verification."
            exit 1
          fi

          workdir="$RUNNER_TEMP/backend-artifact-check"
          rm -rf "$workdir"
          mkdir -p "$workdir"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${BACKEND_ARTIFACT_ID}/zip" \
            -o "$workdir/backend.zip"

          unzip -q "$workdir/backend.zip" -d "$workdir/extracted"
          metadata_path="$(find "$workdir/extracted" -type f -name 'backend-metadata.json' | head -n 1)"
          if [[ -z "$metadata_path" || ! -f "$metadata_path" ]]; then
            echo "::error::backend-metadata.json missing in backend artifact."
            exit 1
          fi

          METADATA_PATH="$metadata_path" node -e "
            const fs = require('fs');
            const targetSha = process.env.TARGET_SHA;
            const outPath = process.env.GITHUB_OUTPUT;
            const metadataPath = process.env.METADATA_PATH;
            let metadata;
            try {
              metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            } catch (_) {
              console.error('Invalid backend metadata JSON.');
              process.exit(1);
            }
            if (!metadata || typeof metadata !== 'object') {
              console.error('backend metadata is empty.');
              process.exit(1);
            }
            if (String(metadata.commitSha || '') !== targetSha) {
              console.error('backend metadata commitSha mismatch.');
              process.exit(1);
            }
            if (String(metadata.workflow || '') !== 'deploy-backend') {
              console.error('backend metadata workflow mismatch.');
              process.exit(1);
            }
            if (metadata.functionsDeployed !== true || metadata.indexesAttempted !== true) {
              console.error('backend metadata required boolean flags are missing.');
              process.exit(1);
            }
            const functionsRevision = String(metadata.functionsRevision || '');
            const indexesSourceSha = String(metadata.indexesSourceSha || '');
            fs.appendFileSync(outPath, 'functions_revision=' + functionsRevision + '\\n');
            fs.appendFileSync(outPath, 'indexes_source_sha=' + indexesSourceSha + '\\n');
          "

  package-production:
    name: package-production
    needs:
      - verify-gates
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-gates.outputs.target_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund

      - name: Verify checkout SHA matches target
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          target_sha="${{ needs.verify-gates.outputs.target_sha }}"
          if [[ "$actual_sha" != "$target_sha" ]]; then
            echo "::error::Checkout SHA mismatch (actual=$actual_sha, target=$target_sha)"
            exit 1
          fi

      - name: Re-run full required checks on target SHA
        run: node tools/run-required-checks.js

      - name: Validate release checklist
        run: node tools/validate-release-checklist.js "${{ needs.verify-gates.outputs.checklist_path }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-production:
    name: deploy-production
    needs:
      - package-production
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: production
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release-manifest:
    name: release-manifest
    needs:
      - verify-gates
      - deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-gates.outputs.target_sha }}
          fetch-depth: 0

      - name: Build release manifest
        id: manifest
        run: |
          set -euo pipefail
          target_sha="${{ needs.verify-gates.outputs.target_sha }}"
          manifest_tmp="$RUNNER_TEMP/RELEASE_MANIFEST.${target_sha}.json"
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          critical_routes_checksum="$(
            {
              printf '%s\0' "firebase-api.js" ".github/workflows/deploy-production.yml" ".github/workflows/deploy-backend.yml"
              git ls-files -z '*_2.HTML'
            } | xargs -0 sha256sum | sha256sum | awk '{print $1}'
          )"

          cat > "$manifest_tmp" <<EOF
          {
            "commitSha": "${target_sha}",
            "deployedAtUtc": "${deployed_at}",
            "firestoreRulesRunId": "${{ needs.verify-gates.outputs.firestore_rules_run_id }}",
            "backendDeployRunId": "${{ needs.verify-gates.outputs.backend_run_id }}",
            "stagingRunId": "${{ needs.verify-gates.outputs.staging_run_id }}",
            "productionRunId": "${{ github.run_id }}",
            "hostingDeploymentUrl": "${{ needs['deploy-production'].outputs.page_url }}",
            "functionsRevision": "${{ needs.verify-gates.outputs.backend_functions_revision }}",
            "indexesSourceSha": "${{ needs.verify-gates.outputs.backend_indexes_source_sha }}",
            "featureFlags": {},
            "criticalRoutesChecksum": "${critical_routes_checksum}"
          }
          EOF
          echo "manifest_tmp=$manifest_tmp" >> "$GITHUB_OUTPUT"

      - name: Commit manifest to release-records branch
        run: |
          set -euo pipefail
          target_sha="${{ needs.verify-gates.outputs.target_sha }}"
          manifest_path="release/RELEASE_MANIFEST.${target_sha}.json"
          manifest_tmp="${{ steps.manifest.outputs.manifest_tmp }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin release-records >/dev/null 2>&1; then
            git fetch origin release-records
            git checkout -B release-records origin/release-records
          else
            git checkout --orphan release-records
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p release
          cp "$manifest_tmp" "$manifest_path"
          git add "$manifest_path"
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore(release): record manifest for ${target_sha}"
          git push origin HEAD:release-records
