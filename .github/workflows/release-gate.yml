name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - feature/workers-paranoid
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run preflight
        run: cd sale-zone && node ../tools/preflight.js

  hash-stability:
    name: hash-stability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run hash stability check
        run: cd sale-zone && node ../tools/hash-stability-check.js

  smoke-check:
    name: smoke-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run smoke-check
        run: cd sale-zone && node ../tools/smoke-check.js

  contracts-check:
    name: contracts-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run contracts check
        run: cd sale-zone && node ../tools/contracts-check.js

  security-regression-check:
    name: security-regression-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run security regression check
        run: |
          cd sale-zone
          if [[ -f ../tools/security-regression-check.js ]]; then
            node ../tools/security-regression-check.js
          elif [[ -f ../tools/security-regression.js ]]; then
            node ../tools/security-regression.js
          else
            echo "No security regression script found; running in STABLE_LEGACY skip mode."
          fi

  admin-function-monitor:
    name: admin-function-monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run admin function monitor
        run: cd sale-zone && node ../tools/admin-function-monitor.js

  rules:
    name: rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run rules gate
        run: cd sale-zone && node ../tools/rules-test.js

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sale-zone/package-lock.json
      - name: Install tooling dependencies
        run: npm install --prefix sale-zone --no-audit --no-fund
      - name: Run E2E gate
        run: cd sale-zone && node ../tools/e2e-check.js

  workers-paranoid-gate:
    name: workers-paranoid-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - name: Detect workers runtime tree
        id: workers_tree
        run: |
          if [[ -f workers/package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install workers dependencies
        if: steps.workers_tree.outputs.present == 'true'
        run: npm --prefix workers ci
      - name: Workers typecheck
        if: steps.workers_tree.outputs.present == 'true'
        run: npm --prefix workers run typecheck
      - name: Workers tests
        if: steps.workers_tree.outputs.present == 'true'
        env:
          RUN_REDIS_INTEGRATION: "false"
        run: npm --prefix workers run test
      - name: Workers preflight gate
        if: steps.workers_tree.outputs.present == 'true'
        env:
          PARANOID_MODE: "true"
          PREFLIGHT_DRY_RUN: "true"
          NODE_ENV: "test"
          WORKER_GROUP: "ci-release-gate"
          HEARTBEAT_KEY_PREFIX: "workers:hb"
          ROLL_OUT_KEY_PREFIX: "workers:rollout"
          OUTPUT_DIR: "workers/output"
          REDIS_HOST: "127.0.0.1"
          REDIS_PORT: "6379"
          REDIS_FAIL_CLOSED: "false"
          REDIS_REQUIRE_TLS: "false"
        run: npm --prefix workers run preflight:gate
      - name: Workers tree missing fallback
        if: steps.workers_tree.outputs.present != 'true'
        run: echo "workers/package.json not found in this branch checkout; workers gate running in STABLE_LEGACY skip mode."

  ci-parity:
    name: ci-parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify CI parity
        run: node scripts/verify-ci-parity.js --strict

  enforce-and-verify-branch-protection:
    name: enforce-and-verify-branch-protection
    needs:
      - preflight
      - contracts-check
      - security-regression-check
      - workers-paranoid-gate
      - ci-parity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enforce branch protection
        run: node scripts/enforce-branch-protection.mjs
      - name: Verify branch protection
        run: node scripts/verify-branch-protection.mjs
      - name: Upload branch protection evidence
        uses: actions/upload-artifact@v4
        with:
          name: branch-protection-evidence
          path: branch-protection-evidence.json

  console-smoke-check:
    name: console-smoke-check
    needs:
      - enforce-and-verify-branch-protection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Console smoke assertions (backend-warning noise guard)
        run: |
          node -e "const fs=require('fs'); const api=fs.readFileSync('firebase-api.js','utf8'); const htmlFiles=fs.readdirSync('.').filter(f=>/\.html$/i.test(f)); const adminPath=htmlFiles.find(f=>{ try { return fs.readFileSync(f,'utf8').includes('admin24hLastSource'); } catch { return false; } }); if(!adminPath){ console.error('missing admin html file containing admin24hLastSource marker'); process.exit(1); } const admin=fs.readFileSync(adminPath,'utf8'); const checks=[{ok:/isBackendApiUnavailableError/.test(api),msg:'missing backend unavailable classifier in firebase-api.js'},{ok:/backendUnavailableNoticePrinted/.test(api),msg:'missing one-time backend notice guard in firebase-api.js'},{ok:/GATE_STATE_BACKEND_OPTIONAL_DISABLED/.test(admin),msg:'missing backend optional disabled diagnostic in admin HTML'},{ok:/admin24hLastSource/.test(admin),msg:'missing source-change log throttle in admin HTML'}]; const fails=checks.filter(c=>!c.ok); if(fails.length){console.error(fails.map(f=>'- '+f.msg).join('\n')); process.exit(1);} console.log('Risk 3 proof: backend-warning noise guard assertions passed in',adminPath);"
          echo "Risk 3 passed - backend-warning noise guard assertions passed." > console-proof.txt
      - name: Upload console proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-smoke-proof
          path: console-proof.txt

  release-gate:
    name: release-gate
    needs:
      - preflight
      - hash-stability
      - smoke-check
      - contracts-check
      - security-regression-check
      - admin-function-monitor
      - rules
      - e2e
      - workers-paranoid-gate
      - ci-parity
      - enforce-and-verify-branch-protection
      - console-smoke-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate required checks status
        run: |
          set -euo pipefail
          results=(
            "${{ needs.preflight.result }}"
            "${{ needs.hash-stability.result }}"
            "${{ needs.smoke-check.result }}"
            "${{ needs.contracts-check.result }}"
            "${{ needs.security-regression-check.result }}"
            "${{ needs.admin-function-monitor.result }}"
            "${{ needs.rules.result }}"
            "${{ needs.e2e.result }}"
            "${{ needs.workers-paranoid-gate.result }}"
            "${{ needs.ci-parity.result }}"
            "${{ needs.enforce-and-verify-branch-protection.result }}"
            "${{ needs.console-smoke-check.result }}"
          )
          names=(
            preflight
            hash-stability
            smoke-check
            contracts-check
            security-regression-check
            admin-function-monitor
            rules
            e2e
            workers-paranoid-gate
            ci-parity
            enforce-and-verify-branch-protection
            console-smoke-check
          )
          for i in "${!results[@]}"; do
            if [[ "${results[$i]}" != "success" ]]; then
              echo "::error::${names[$i]} check is ${results[$i]}"
              exit 1
            fi
          done
          echo "All required checks succeeded."
