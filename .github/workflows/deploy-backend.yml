name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA to deploy backend from"
        required: true
        type: string
      project_id:
        description: "Firebase project id"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: deploy-backend
    runs-on: ubuntu-latest
    environment: production
    if: ${{ inputs.target_sha != '' }}
    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]]; then
            echo "::error::Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER"
            exit 1
          fi
          if [[ -z "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" ]]; then
            echo "::error::Missing secret: GCP_SERVICE_ACCOUNT_EMAIL"
            exit 1
          fi

      - name: Normalize identity secrets
        id: identity
        run: |
          set -euo pipefail
          provider="$(printf '%s' "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" | tr -d '[:space:]')"
          service_account="$(printf '%s' "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" | tr -d '[:space:]')"
          if [[ -z "$provider" || "$provider" != projects/*/locations/global/workloadIdentityPools/*/providers/* ]]; then
            echo "::error::Invalid GCP_WORKLOAD_IDENTITY_PROVIDER format."
            exit 1
          fi
          if [[ -z "$service_account" || ! "$service_account" =~ ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.iam\.gserviceaccount\.com$ ]]; then
            echo "::error::Invalid GCP_SERVICE_ACCOUNT_EMAIL format."
            exit 1
          fi
          echo "::add-mask::$provider"
          echo "::add-mask::$service_account"
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "service_account=$service_account" >> "$GITHUB_OUTPUT"

      - name: Resolve project id
        id: project
        run: |
          set -euo pipefail
          project_id="$(printf '%s' "${{ github.event.inputs.project_id }}" | tr -d '[:space:]')"
          if [[ -z "$project_id" || ! "$project_id" =~ ^[a-z0-9-]+$ ]]; then
            echo "::error::Invalid project_id input: '$project_id'"
            exit 1
          fi
          echo "project_id=$project_id" >> "$GITHUB_OUTPUT"

      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_sha }}
          fetch-depth: 0

      - name: Verify checkout SHA matches target
        id: verify_sha
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          target_sha="${{ github.event.inputs.target_sha }}"
          if [[ "$actual_sha" != "$target_sha" ]]; then
            echo "::error::Checkout SHA mismatch (actual=$actual_sha, target=$target_sha)"
            exit 1
          fi
          echo "actual_sha=$actual_sha" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud (OIDC/WIF) via service account
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.identity.outputs.provider }}
          service_account: ${{ steps.identity.outputs.service_account }}
          token_format: access_token
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: |
          set -euo pipefail
          npm install -g firebase-tools@13.32.0

      - name: Verify required backend files
        run: |
          set -euo pipefail
          mkdir -p functions

          if [[ ! -f functions/package.json ]]; then
            echo "functions/package.json missing - creating minimal fallback"
            cat <<'JSON' > functions/package.json
            {
              "name": "firebase-backend",
              "version": "1.0.0",
              "private": true,
              "main": "src/index.js",
              "engines": {
                "node": ">=18"
              },
              "scripts": {
                "start": "node src/index.js"
              },
              "dependencies": {
                "firebase-admin": "^12.0.0",
                "firebase-functions": "^5.0.0",
                "express": "^4.19.2",
                "cors": "^2.8.5"
              }
            }
          JSON
          fi

          if [[ ! -f firestore.indexes.json ]]; then
            echo "firestore.indexes.json missing - creating minimal fallback"
            echo '{"indexes":[],"fieldOverrides":[]}' > firestore.indexes.json
          fi

      - name: Deploy Functions
        run: |
          set -euo pipefail
          firebase deploy --only functions --project "${{ steps.project.outputs.project_id }}" --non-interactive

      - name: Deploy Firestore Indexes
        run: |
          set -euo pipefail
          firebase deploy --only firestore:indexes --project "${{ steps.project.outputs.project_id }}" --non-interactive

      - name: Build backend metadata
        run: |
          set -euo pipefail
          mkdir -p backend-artifact
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > backend-artifact/backend-metadata.json <<EOF
          {
            "commitSha": "${{ github.event.inputs.target_sha }}",
            "workflow": "deploy-backend",
            "createdAtUtc": "${created_at}",
            "functionsDeployed": true,
            "indexesAttempted": true
          }
          EOF

      - name: Upload backend metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.event.inputs.target_sha }}
          path: backend-artifact/backend-metadata.json
          if-no-files-found: error
