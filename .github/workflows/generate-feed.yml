name: Generate Google Shopping Feed

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Node version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Generate feed.xml
        run: node tools/generate-feed.js

      - name: Commit feed.xml
        run: |
          git checkout "${GITHUB_REF_NAME:-main}"
          git config user.email "feed-bot@sale-zone.com"
          git config user.name "Feed Bot"
          git add feed.xml
          git diff --staged --quiet || git commit -m "chore(feed): regenerate Google Shopping feed [skip ci]"
          git diff --staged --quiet || git push origin "HEAD:${GITHUB_REF_NAME:-main}"
