name: workers-paranoid-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  workers-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package.json

      - name: Install workers dependencies
        run: npm --prefix workers install

      - name: Typecheck
        run: npm --prefix workers run typecheck

  workers-test:
    runs-on: ubuntu-latest
    needs: workers-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package.json

      - name: Install workers dependencies
        run: npm --prefix workers install

      - name: Test
        env:
          RUN_REDIS_INTEGRATION: "false"
        run: npm --prefix workers run test

  workers-preflight-gate:
    runs-on: ubuntu-latest
    needs: workers-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package.json

      - name: Install workers dependencies
        run: npm --prefix workers install

      - name: Run preflight gate (dry runtime mode)
        env:
          PARANOID_MODE: "true"
          PREFLIGHT_DRY_RUN: "true"
          NODE_ENV: "test"
          WORKER_GROUP: "ci-gate"
          HEARTBEAT_KEY_PREFIX: "workers:hb"
          ROLL_OUT_KEY_PREFIX: "workers:rollout"
          OUTPUT_DIR: "workers/output"
          REDIS_HOST: "127.0.0.1"
          REDIS_PORT: "6379"
        run: npm --prefix workers run preflight:gate

      - name: Upload preflight reports
        uses: actions/upload-artifact@v4
        with:
          name: workers-preflight-report
          path: |
            workers/output/preflight-gate.report.json
            reports/paranoid-ultra-final.json

  workers-detect-best-sha:
    runs-on: ubuntu-latest
    needs: workers-preflight-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package.json

      - name: Install workers dependencies
        run: npm --prefix workers install

      - name: Detect best SHA
        env:
          PARANOID_MODE: "true"
          PREFLIGHT_DRY_RUN: "true"
          MAX_CANDIDATES: "20"
          NODE_ENV: "test"
          WORKER_GROUP: "ci-detect"
          HEARTBEAT_KEY_PREFIX: "workers:hb"
          ROLL_OUT_KEY_PREFIX: "workers:rollout"
          OUTPUT_DIR: "workers/output"
          REDIS_HOST: "127.0.0.1"
          REDIS_PORT: "6379"
        run: npm --prefix workers run detect:best-sha

      - name: Upload detect reports
        uses: actions/upload-artifact@v4
        with:
          name: workers-detect-best-sha-report
          path: |
            workers/output/detect-best-sha.report.json
            reports/paranoid-ultra-scan.json
