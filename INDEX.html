<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=متجر_2.HTML">
    <link rel="icon" href="./icon-192.png">
    <title>Sale Zone Store - متجر إلكتروني فاخر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A1128 0%, #1A2744 100%);
            color: #D4AF37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .loader {
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="loader">
        <h1>🛍️ Sale Zone Store</h1>
        <div class="spinner"></div>
        <p>جاري التحويل إلى المتجر...</p>
        <p style="font-size: 14px; margin-top: 20px;">
            <a href="متجر_2.HTML" style="color: #D4AF37; text-decoration: underline;">
                اضغط هنا إذا لم يتم التحويل تلقائياً
            </a>
        </p>
    </div>

    <script>
        // Redirect after 1 second
        setTimeout(function () {
            window.location.href = "متجر_2.HTML";
        }, 1000);
    </script>
</body>

</html>
